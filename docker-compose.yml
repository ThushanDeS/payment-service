version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: payment-postgres
    restart: always
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data
    networks:
      - payment-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build: .
    container_name: payment-service
    restart: always
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - ENVIRONMENT=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=payment_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - FLIGHT_SERVICE_URL=http://host.docker.internal:5001
      - BOOKING_SERVICE_URL=http://host.docker.internal:5002
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - payment-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  payment_postgres_data:

networks:
  payment-network:
    driver: bridge